<app-header></app-header>
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="login-form mx-auto">
                <h2 class="login-header">Dang nhap</h2>
                <div class="form-group">
                    <label for="email">Email/Phone</label>
                    <input type="text" class="form-control" id="email">
                    <div class="divider-nospace"></div>
                </div>
                <div class="mt-4"></div>
                <div class="form-group password-field">
                    <label for="password">Mat khau</label>
                    <input type="password" placeholder="It nhat 3 ki tu" class="form-control" id="password">
                    <i class="password-toggle fas fa-eye-slash"></i>
                    <div class="divider-nospace"></div>
                </div>
                <div class="form-group">
                    <div class="form-check checkbox-text">
                        <span style="display: flex;">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label text-start" for="remember">Ghi nho dang nhap</label>
                        </span>
                        <a href="#" class="register-link">Quen mat khau</a>
                    </div>
                </div>
                <div class="form-group">
                    <select class="form-control access-right">
                        <option selected disabled>Quyen dang nhap</option>
                        <option>Nguoi dung</option>
                        <option>Quan tri vien</option>
                    </select>
                </div>
                <button tyoe="button" class="login-button">Dang nhap</button>
                <div class="divider"></div>
                <p class="text-center">Ban chua dang ky?
                    <span><a href="#" class="register-link">Tao tai khoan</a></span>
                </p>
            </div>
        </div>
    </div>
<app-footer></app-footer>
